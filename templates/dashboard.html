<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laldia 港湾微信群台账</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="project-selector">
      <select id="project-select" class="project-select">
        <option value="Laldia">Laldia</option>
      </select>
      <h1 class="app-title"><span>港湾</span></h1>
    </div>
    <span class="app-subtitle">微信群台账</span>
  </div>
  <div class="header-controls">
    <span class="meta-info" id="meta-info">加载中...</span>
    <div class="header-actions">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="搜索消息内容...">
      </div>
      <button id="export-btn" class="btn-export">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出Excel
      </button>
      <button id="refresh-btn" class="btn-refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        刷新消息
      </button>
    </div>
  </div>
</header>

<nav class="category-bar">
  <div id="category-tabs" class="category-tabs-inner"></div>
  <select id="creator-filter" class="filter-select">
    <option value="">按群主筛选</option>
  </select>
</nav>

<main class="main-content">
  <div class="table-container" id="table-container">
    <table id="groups-table">
      <colgroup>
        <col class="col-idx">
        <col class="col-name">
        <col class="col-cat">
        <col class="col-date">
        <col class="col-count">
        <col class="col-creator">
        <col class="col-msgs">
        <col class="col-contacts">
      </colgroup>
      <thead>
        <tr>
          <th>#</th>
          <th>群名</th>
          <th>分类</th>
          <th>最后活跃</th>
          <th>消息数</th>
          <th>群主</th>
          <th>最近消息</th>
          <th>联系信息</th>
        </tr>
      </thead>
      <tbody id="groups-tbody"></tbody>
    </table>
  </div>
</main>

<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-header-top">
      <h2 id="drawer-title"></h2>
      <button class="drawer-close" id="drawer-close">&times;</button>
    </div>
    <div class="drawer-tabs" id="drawer-tabs">
      <button class="drawer-tab active" data-tab="messages">消息</button>
      <button class="drawer-tab" data-tab="summary">群摘要</button>
      <button class="drawer-tab" data-tab="extractions">关键信息</button>
      <button class="drawer-tab" data-tab="settings">设置</button>
    </div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<div class="modal-overlay" id="sync-modal-overlay"></div>
<div class="modal" id="sync-modal">
  <h3>同步消息中</h3>
  <div class="progress-bar"><div class="progress-fill" id="sync-progress"></div></div>
  <p id="sync-status-text">正在调用 wx-cli 拉取最新消息...</p>
  <button class="btn-modal-close" id="sync-modal-close" style="display:none">关闭</button>
</div>

<div class="search-panel" id="search-panel" style="display:none">
  <div class="search-panel-header">
    <span id="search-panel-title"></span>
    <button class="search-panel-close" id="search-panel-close">&times;</button>
  </div>
  <div class="search-panel-body" id="search-panel-body"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
